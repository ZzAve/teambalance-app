spring:
  application:
    name: teambalance-api
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /internal/actuator
      exposure:
        include: health,info,metrics